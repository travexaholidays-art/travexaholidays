<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travexa Holidays</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,Arial;background:#fff}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:#0a2540;
}
nav img{height:55px}
nav a{
  color:#fff;
  margin-left:20px;
  text-decoration:none;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:400px;
  overflow:hidden;
}

.slides{
  display:flex;
  width:100%;
  transition:transform 0.5s ease;
}

.slides img{
  width:100%;
  flex-shrink:0;
  height:400px;
  object-fit:cover;
}

/* BUTTONS */
.prev, .next{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  color:#fff;
  border:none;
  padding:10px 15px;
  font-size:22px;
  cursor:pointer;
  border-radius:50%;
}

.prev{left:15px}
.next{right:15px}

/* TEXT BELOW */
.hero-text{
  text-align:center;
  padding:40px 20px;
}

.hero-text h2{
  font-size:36px;
  color:#0a2540;
}

.hero-text p{
  color:#555;
  margin:10px 0 20px;
}

.btn{
  background:#ff7a00;
  color:#fff;
  padding:12px 25px;
  border-radius:25px;
  text-decoration:none;
}

/* PACKAGES */
section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

h3{
  text-align:center;
  margin-bottom:30px;
  color:#0a2540;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card div{
  padding:15px;
}

.card h4{
  color:#0a2540;
}

.price{
  color:#ff7a00;
  font-weight:bold;
}

footer{
  background:#111;
  color:#fff;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <img src="logo.png">
  <div>
    <a href="#packages">Packages</a>
    <a href="packages.html">Prices</a>
    <a href="#enquiry">Enquiry</a>
  </div>
</nav>

<!-- SLIDER WITH BUTTONS -->
<header class="slider">

  <div class="slides" id="slides">
  <img src="https://i.pinimg.com/736x/6f/02/72/6f027229d902d206b5756f728568f144.jpg">
  <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
  <img src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
</div>

  <button class="prev" onclick="prevSlide()">❮</button>
  <button class="next" onclick="nextSlide()">❯</button>

</header>

<!-- TEXT BELOW -->
<section class="hero-text">
  <h2>Explore the World with Travexa Holidays</h2>
  <p>Domestic & International tour packages at the best prices with trusted service.</p>
  <a href="#packages" class="btn">Get Best Deal</a>
</section>

<!-- PACKAGES -->
<section id="packages">
  <h3>Popular Packages</h3>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1544735716-392fe2489ffa">
      <div>
        <h4>Kashmir Tour</h4>
        <p class="price">₹21,999</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1609947017136-9daf32a5eb16">
      <div>
        <h4>Himachal Tour</h4>
        <p class="price">₹18,999</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1626621341517-bbf3d9990a23">
      <div>
        <h4>Uttarakhand Tour</h4>
        <p class="price">₹16,999</p>
      </div>
    </div>

  </div>
</section>

<footer>
  © Travexa Holidays
</footer>

<!-- JAVASCRIPT -->
<script>
let index = 0;

function showSlide(){
  const slides = document.getElementById("slides");
  slides.style.transform = "translateX(-" + (index * 100) + "%)";
}

function nextSlide(){
  if(index < 2){
    index++;
  } else {
    index = 0;
  }
  showSlide();
}

function prevSlide(){
  if(index > 0){
    index--;
  } else {
    index = 2;
  }
  showSlide();
}
</script>

</body>
</html>
